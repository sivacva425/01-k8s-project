apiVersion: v1
kind: Service
metadata:
  name: ai-devops-backend-stable
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: ai-devops-backend
---
apiVersion: v1
kind: Service
metadata:
  name: ai-devops-backend-canary
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: ai-devops-backend
