name: Continuous Integration & GitOps Automation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**' # 👈 Only trigger the pipeline if application source code code changes

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Log into Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate Short SHA Tag
      id: meta
      run: echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./src
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/production-app:${{ env.SHA_TAG }}
          ${{ secrets.DOCKERHUB_USERNAME }}/production-app:latest

    - name: Update GitOps Chart Values Manifest
      run: |
        # Use sed to programmatically update the tag: target parameter inside your values.yaml dashboard file
        sed -i 's/tag: .*/tag: "${{ env.SHA_TAG }}"/g' helm-charts/web-app/values.yaml

    - name: Commit & Push Infrastructure Updates to GitHub
      run: |
        git config --global user.name "GitHub Actions Automation"
        git config --global user.email "actions@github.com"
        git add helm-charts/web-app/values.yaml
        git commit -m "chore(gitops): dynamically bump container image release tag to ${{ env.SHA_TAG }} [skip ci]"
        git push origin main
