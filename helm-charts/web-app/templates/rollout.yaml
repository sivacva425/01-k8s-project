apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-rollout
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    canary:
      # Services used to split traffic natively or via an Ingress controller
      stableService: {{ .Release.Name }}-stable
      canaryService: {{ .Release.Name }}-canary
      trafficRouting:
        nginx:
          stableIngress: {{ .Release.Name }}-ingress
      analysis:
        # Automatically runs background checks during rollout
        templates:
          - templateName: success-rate-check
      steps:
        - setWeight: 10
          pause: { duration: 2m } # Hold traffic at 10% for 2 minutes to evaluate logs
        - setWeight: 50
          pause: { duration: 5m } # Expand to 50% traffic if stable
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: web-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
