apiVersion: v1
kind: Service
metadata:
  name: production-app-stable
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: production-app
---
apiVersion: v1
kind: Service
metadata:
  name: production-app-canary
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: production-app
