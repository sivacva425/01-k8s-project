{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: default
  annotations:
    # This matches the className inside your values.yaml file
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    # If using Nginx Ingress Controller, these annotations allow advanced rewrites
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
  - host: {{ .Values.ingress.host | quote }} # Injects "webapp.local" from values.yaml
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            # 🔄 Connects directly to your stable service path
            name: {{ .Release.Name }}-stable
            port:
              number: 80
{{- end }}
